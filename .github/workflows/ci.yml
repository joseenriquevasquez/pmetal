name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Check & Lint
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5


      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --exclude pmetal-py -- -D warnings

      - name: Build
        run: cargo build --workspace --exclude pmetal-py --release

  test:
    name: Test
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5


      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Single-threaded tests to avoid Metal/GPU conflicts
      # Exclude pmetal-py (needs Python dev libs not available on CI runner)
      - name: Run tests
        run: cargo test --workspace --exclude pmetal-py --release -- --test-threads=1
