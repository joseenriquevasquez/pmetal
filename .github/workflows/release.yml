name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.3.6)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check
        run: cargo check --all
      - name: Test
        run: cargo test --all -- --test-threads=1

  # ============================================================
  # CLI Binary (aarch64-apple-darwin)
  # ============================================================
  build-cli:
    name: Build CLI (aarch64-apple-darwin)
    runs-on: macos-latest
    needs: test
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-aarch64-apple-darwin-${{ hashFiles('**/Cargo.lock') }}
          shared-key: cli-aarch64-apple-darwin

      - name: Build CLI
        run: cargo build --release --target aarch64-apple-darwin -p pmetal-cli

      - name: Stage metallib
        run: |
          MLX_METALLIB=$(find target/aarch64-apple-darwin/release/build/pmetal-mlx-sys-*/out/build/lib -name "mlx.metallib" | head -1)
          if [ -z "$MLX_METALLIB" ]; then
            echo "ERROR: mlx.metallib not found in build output"
            exit 1
          fi
          cp "$MLX_METALLIB" "target/aarch64-apple-darwin/release/mlx.metallib"
          echo "Staged mlx.metallib ($(du -h target/aarch64-apple-darwin/release/mlx.metallib | cut -f1))"

      # macOS Code Signing
      - name: Import Apple Code Signing Certificate
        continue-on-error: true
        uses: Apple-Actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Code sign and notarize CLI binary
        run: |
          BINARY="target/aarch64-apple-darwin/release/pmetal"
          METALLIB="target/aarch64-apple-darwin/release/mlx.metallib"
          CERT_IMPORTED=false

          if security find-identity -v -p codesigning | grep -q "Developer ID Application"; then
            CERT_IMPORTED=true
          fi

          if [ "$CERT_IMPORTED" = "true" ]; then
            echo "Signing with Developer ID..."
            codesign --force --verify --verbose \
              --timestamp --options runtime \
              --sign "${{ secrets.APPLE_DEVELOPER_ID }}" \
              "$METALLIB"
            codesign --deep --force --verify --verbose \
              --timestamp --options runtime \
              --sign "${{ secrets.APPLE_DEVELOPER_ID }}" \
              "$BINARY"

            codesign -v "$BINARY"
            codesign -v "$METALLIB"

            echo "Notarizing with Apple..."
            mkdir -p notarize_staging
            cp "$BINARY" "$METALLIB" notarize_staging/
            ditto -c -k --sequesterRsrc notarize_staging pmetal-notarize.zip
            rm -rf notarize_staging

            xcrun notarytool submit pmetal-notarize.zip \
              --apple-id "${{ secrets.APPLE_ID }}" \
              --password "${{ secrets.APPLE_ID_PASSWORD }}" \
              --team-id "${{ secrets.APPLE_TEAM_ID }}" \
              --wait \
              --timeout 30m

            rm -f pmetal-notarize.zip
            echo "CLI binary signed and notarized"
          else
            echo "No Developer ID certificate - using ad-hoc signing..."
            codesign --remove-signature "$BINARY" || true
            codesign -s - "$BINARY"
            codesign --remove-signature "$METALLIB" || true
            codesign -s - "$METALLIB"
            echo "CLI binary ad-hoc signed"
          fi

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Prepare CLI artifacts
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p artifacts
          BINARY_NAME="pmetal-${VERSION}-aarch64-apple-darwin"
          cp "target/aarch64-apple-darwin/release/pmetal" "$BINARY_NAME"
          cp "target/aarch64-apple-darwin/release/mlx.metallib" mlx.metallib
          chmod +x "$BINARY_NAME"

          tar -czf "artifacts/${BINARY_NAME}.tar.gz" "$BINARY_NAME" mlx.metallib
          cp mlx.metallib artifacts/mlx.metallib

          shasum -a 256 "artifacts/${BINARY_NAME}.tar.gz" > "artifacts/${BINARY_NAME}.tar.gz.sha256"
          shasum -a 256 "artifacts/mlx.metallib" > "artifacts/mlx.metallib.sha256"

          echo "CLI artifacts:"
          ls -lh artifacts/

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-aarch64-apple-darwin
          path: artifacts/*
          if-no-files-found: error
          retention-days: ${{ startsWith(github.ref, 'refs/tags/v') && 7 || 1 }}

  # ============================================================
  # GUI App (Tauri — macOS aarch64)
  # ============================================================
  build-gui:
    name: Build GUI (macOS aarch64)
    runs-on: macos-latest
    needs: test
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: './crates/pmetal-gui/src-tauri -> target'
          key: gui-aarch64-apple-darwin-${{ hashFiles('**/Cargo.lock') }}
          shared-key: gui-aarch64-apple-darwin
          cache-on-failure: true

      - name: Install frontend dependencies
        working-directory: crates/pmetal-gui
        run: bun install --frozen-lockfile

      # macOS Code Signing
      - name: Import Apple Code Signing Certificate
        continue-on-error: true
        uses: Apple-Actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Verify certificate import
        run: |
          if security find-identity -v -p codesigning | grep -q "Developer ID Application"; then
            echo "APPLE_CERT_IMPORTED=true" >> $GITHUB_ENV
            echo "Apple Developer ID certificate found"
          else
            echo "APPLE_CERT_IMPORTED=false" >> $GITHUB_ENV
            echo "No Developer ID certificate - will use ad-hoc signing"
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_NET_GIT_FETCH_WITH_CLI: 'true'
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: crates/pmetal-gui
          args: --target aarch64-apple-darwin

      # Post-build notarization
      - name: Notarize macOS app
        if: env.APPLE_CERT_IMPORTED == 'true'
        run: |
          APP_PATH=$(find crates/pmetal-gui/src-tauri/target/aarch64-apple-darwin/release/bundle/macos -name "*.app" -type d | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found, skipping notarization"
            exit 0
          fi

          echo "Found app: $APP_PATH"

          if codesign -v "$APP_PATH" 2>/dev/null; then
            echo "App already signed by Tauri"
            codesign -vvv --deep --strict "$APP_PATH"

            APP_NAME=$(basename "$APP_PATH")
            cd "$(dirname "$APP_PATH")"
            ditto -c -k --sequesterRsrc --keepParent "$APP_NAME" "${APP_NAME%.app}-notarize.zip"

            echo "Submitting for notarization..."
            xcrun notarytool submit "${APP_NAME%.app}-notarize.zip" \
              --apple-id "${{ secrets.APPLE_ID }}" \
              --password "${{ secrets.APPLE_ID_PASSWORD }}" \
              --team-id "${{ secrets.APPLE_TEAM_ID }}" \
              --wait \
              --timeout 30m

            xcrun stapler staple "$APP_PATH"
            echo "App notarized and stapled"
          fi

      - name: Ad-hoc sign macOS app (fallback)
        if: env.APPLE_CERT_IMPORTED != 'true'
        run: |
          APP_PATH=$(find crates/pmetal-gui/src-tauri/target/aarch64-apple-darwin/release/bundle/macos -name "*.app" -type d | head -n 1)
          if [ -n "$APP_PATH" ]; then
            echo "Using ad-hoc signature..."
            codesign --remove-signature "$APP_PATH" || true
            codesign -s - --deep --force "$APP_PATH"
            codesign -v "$APP_PATH"
            echo "App ad-hoc signed (Gatekeeper warning expected)"
          fi

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Prepare GUI artifacts
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p artifacts

          # DMG
          find crates/pmetal-gui/src-tauri/target/aarch64-apple-darwin/release/bundle -type f -name "*.dmg" | while read file; do
            filename=$(basename "$file")
            destname="PMetal-${VERSION}-aarch64-apple-darwin-${filename}"
            cp "$file" "artifacts/$destname"
            shasum -a 256 "artifacts/$destname" | awk '{print $1 "  '"$destname"'"}' > "artifacts/$destname.sha256"
            echo "Packaged: $destname"
          done

          # Fallback: tar.gz of .app if no DMG
          if [ ! "$(ls -A artifacts/*.dmg 2>/dev/null)" ]; then
            APP_PATH=$(find crates/pmetal-gui/src-tauri/target/aarch64-apple-darwin/release/bundle/macos -name "*.app" -type d | head -n 1)
            if [ -n "$APP_PATH" ]; then
              APP_NAME=$(basename "$APP_PATH")
              DEST_NAME="PMetal-${VERSION}-aarch64-apple-darwin.tar.gz"
              tar -czf "artifacts/$DEST_NAME" -C "$(dirname "$APP_PATH")" "$APP_NAME"
              shasum -a 256 "artifacts/$DEST_NAME" > "artifacts/$DEST_NAME.sha256"
              echo "Packaged: $DEST_NAME"
            fi
          fi

          echo "GUI artifacts:"
          ls -lh artifacts/

      - name: Upload GUI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gui-macos-aarch64
          path: artifacts/*
          if-no-files-found: error
          retention-days: ${{ startsWith(github.ref, 'refs/tags/v') && 7 || 1 }}

  # ============================================================
  # Create GitHub Release
  # ============================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-cli, build-gui]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release assets
        run: |
          mkdir -p final-release
          find release-artifacts -type f \( -name "*.tar.gz" -o -name "*.dmg" -o -name "*.sha256" -o -name "mlx.metallib" \) -exec cp {} final-release/ \;

          echo "Release contents:"
          ls -lah final-release/

          # Generate combined checksums
          cd final-release
          sha256sum *.tar.gz *.dmg 2>/dev/null | grep -v "No such file" > SHA256SUMS || true
          cat SHA256SUMS

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: 'PMetal ${{ steps.version.outputs.version }}'
          body: |
            ## Downloads

            | Asset | Description |
            |-------|-------------|
            | `pmetal-*-aarch64-apple-darwin.tar.gz` | CLI binary + mlx.metallib (Apple Silicon) |
            | `PMetal-*-aarch64-apple-darwin-*.dmg` | Desktop GUI app (Apple Silicon) |
            | `mlx.metallib` | MLX Metal shader library (standalone) |

            ### CLI Quick Start
            ```bash
            tar xzf pmetal-*-aarch64-apple-darwin.tar.gz
            ./pmetal train --model Qwen/Qwen3-0.6B --dataset train.jsonl --output ./output
            ```

            ### GUI
            Mount the DMG and drag PMetal to Applications.
          files: |
            final-release/*.tar.gz
            final-release/*.dmg
            final-release/*.sha256
            final-release/mlx.metallib
            final-release/SHA256SUMS
          generate_release_notes: true
          draft: false
          prerelease: false
