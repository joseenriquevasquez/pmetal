name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  test:
    name: Test
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
      - name: Check
        run: cargo check --all
      - name: Test
        run: cargo test --all -- --test-threads=1

  build:
    name: Build (aarch64-apple-darwin)
    runs-on: macos-latest
    needs: test
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          key: aarch64-apple-darwin-${{ hashFiles('**/Cargo.lock') }}
          shared-key: aarch64-apple-darwin

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin -p pmetal-cli

      - name: Prepare build-time artifacts (before signing)
        run: |
          BINARY="target/aarch64-apple-darwin/release/pmetal"
          # Find and copy MLX Metal shader library
          MLX_METALLIB=$(find target/aarch64-apple-darwin/release/build/pmetal-mlx-sys-*/out/build/lib -name "mlx.metallib" | head -1)
          if [ -z "$MLX_METALLIB" ]; then
            echo "ERROR: mlx.metallib not found in build output"
            exit 1
          fi
          cp "$MLX_METALLIB" "target/aarch64-apple-darwin/release/mlx.metallib"
          echo "Found mlx.metallib and staged for signing"

      # Optional code signing (requires secrets to be configured)
      - name: Import Apple Code Signing Certificate
        continue-on-error: true
        uses: Apple-Actions/import-codesign-certs@63fff01cd422d4b7b855d40ca1e9d34d2de9427d # v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Code sign and notarize macOS binary
        run: |
          BINARY="target/aarch64-apple-darwin/release/pmetal"
          METALLIB="target/aarch64-apple-darwin/release/mlx.metallib"
          CERT_IMPORTED=false

          if security find-identity -v -p codesigning | grep -q "Developer ID Application"; then
            CERT_IMPORTED=true
          fi

          if [ "$CERT_IMPORTED" = "true" ]; then
            echo "Signing with Developer ID..."
            
            # Sign the metallib first (best practice for Sequoia+)
            codesign --force --verify --verbose \
              --timestamp --options runtime \
              --sign "${{ secrets.APPLE_DEVELOPER_ID }}" \
              "$METALLIB"
              
            # Sign the main binary
            codesign --deep --force --verify --verbose \
              --timestamp --options runtime \
              --sign "${{ secrets.APPLE_DEVELOPER_ID }}" \
              "$BINARY"
            
            codesign -v "$BINARY"
            codesign -v "$METALLIB"

            echo "Notarizing with Apple..."
            # Create a zip containing both binary and metallib for notarization
            # ditto requires a single source directory, so stage files first
            mkdir -p notarize_staging
            cp "$BINARY" "$METALLIB" notarize_staging/
            ditto -c -k --sequesterRsrc notarize_staging pmetal-notarize.zip
            rm -rf notarize_staging

            xcrun notarytool submit pmetal-notarize.zip \
              --apple-id "${{ secrets.APPLE_ID }}" \
              --password "${{ secrets.APPLE_ID_PASSWORD }}" \
              --team-id "${{ secrets.APPLE_TEAM_ID }}" \
              --wait \
              --timeout 30m

            rm -f pmetal-notarize.zip

            echo "Note: Stapling is not applicable to bare CLI binaries"
            echo "Binary is notarized server-side - users will be verified online"

            echo "Verifying notarization status..."
            spctl -a -v "$BINARY" || true
            echo "Binary and library signed and notarized"
          else
            echo "Developer ID certificate not configured. Using ad-hoc signing..."
            codesign --remove-signature "$BINARY" || true
            codesign -s - "$BINARY"
            
            codesign --remove-signature "$METALLIB" || true
            codesign -s - "$METALLIB"
            
            codesign -v "$BINARY"
            codesign -v "$METALLIB"
            echo "Binary ad-hoc signed (users may see Gatekeeper warning)"
          fi

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare artifacts
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p artifacts
          BINARY_NAME="pmetal-${VERSION}-aarch64-apple-darwin"
          cp "target/aarch64-apple-darwin/release/pmetal" "$BINARY_NAME"
          cp "target/aarch64-apple-darwin/release/mlx.metallib" mlx.metallib
          chmod +x "$BINARY_NAME"

          echo "Bundled mlx.metallib ($(du -h mlx.metallib | cut -f1))"

          # Create tar.gz with binary + metallib
          tar -czf "artifacts/${BINARY_NAME}.tar.gz" "$BINARY_NAME" mlx.metallib

          # Also upload metallib as standalone asset (for auto-download on first run)
          cp mlx.metallib artifacts/mlx.metallib

          # Checksum the archive and metallib
          shasum -a 256 "artifacts/${BINARY_NAME}.tar.gz" > "artifacts/${BINARY_NAME}.tar.gz.sha256"
          shasum -a 256 "artifacts/mlx.metallib" > "artifacts/mlx.metallib.sha256"

          echo "Artifact contents:"
          ls -lh "$BINARY_NAME" mlx.metallib
          file "$BINARY_NAME"
          cat "artifacts/${BINARY_NAME}.tar.gz.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: aarch64-apple-darwin
          path: artifacts/*
          if-no-files-found: error
          retention-days: ${{ startsWith(github.ref, 'refs/tags/v') && 7 || 1 }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: release-artifacts

      - name: Prepare release assets
        run: |
          mkdir -p final-release
          find release-artifacts -name "*.tar.gz" -type f -exec cp {} final-release/ \;
          find release-artifacts -name "*.sha256" -type f -exec cp {} final-release/ \;
          find release-artifacts -name "mlx.metallib" -type f -exec cp {} final-release/ \;

          echo "Release contents:"
          ls -lah final-release/

          echo "Verifying archive integrity:"
          cd final-release
          for archive in *.tar.gz; do
            [ -f "$archive" ] || continue
            echo "Testing $archive:"
            tar -tzf "$archive" | head -5
          done

          # Generate combined checksums for archives
          sha256sum *.tar.gz 2>/dev/null > SHA256SUMS || true
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: |
            final-release/*.tar.gz
            final-release/*.sha256
            final-release/mlx.metallib
            final-release/SHA256SUMS
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
